<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glowA" cx="30%" cy="35%" r="55%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#f59e0b" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="70%" cy="55%" r="60%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#38bdf8" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0b1220" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowA)"/>
  <rect width="1600" height="900" fill="url(#glowB)"/>

  <!-- Abstract UI closeups cards -->
  <g opacity="0.95">
    <g transform="translate(170 170)">
      <rect x="0" y="0" width="560" height="340" rx="28" fill="url(#card)" stroke="#243044" stroke-opacity="0.7"/>
      <rect x="34" y="38" width="220" height="16" rx="8" fill="#1f2a3d"/>
      <rect x="34" y="76" width="492" height="12" rx="6" fill="#172033"/>
      <rect x="34" y="102" width="412" height="12" rx="6" fill="#172033"/>
      <g transform="translate(34 150)">
        <rect x="0" y="0" width="240" height="140" rx="18" fill="#0b1220" stroke="#243044" stroke-opacity="0.6"/>
        <circle cx="50" cy="48" r="16" fill="#f59e0b" opacity="0.85"/>
        <rect x="80" y="40" width="140" height="14" rx="7" fill="#22314b"/>
        <rect x="20" y="84" width="200" height="10" rx="5" fill="#172033"/>
        <rect x="20" y="104" width="160" height="10" rx="5" fill="#172033"/>
      </g>
      <g transform="translate(296 150)">
        <rect x="0" y="0" width="230" height="60" rx="18" fill="#0b1220" stroke="#243044" stroke-opacity="0.6"/>
        <rect x="20" y="22" width="120" height="14" rx="7" fill="#22314b"/>
        <rect x="158" y="18" width="52" height="22" rx="11" fill="#1f2a3d"/>
        <circle cx="196" cy="29" r="10" fill="#38bdf8" opacity="0.9"/>
      </g>
      <g transform="translate(296 230)">
        <rect x="0" y="0" width="230" height="60" rx="18" fill="#0b1220" stroke="#243044" stroke-opacity="0.6"/>
        <rect x="20" y="22" width="88" height="14" rx="7" fill="#22314b"/>
        <rect x="126" y="18" width="84" height="22" rx="11" fill="#f59e0b" opacity="0.22"/>
        <circle cx="140" cy="29" r="10" fill="#f59e0b" opacity="0.95"/>
      </g>
    </g>

    <g transform="translate(820 260)">
      <rect x="0" y="0" width="610" height="400" rx="28" fill="url(#card)" stroke="#243044" stroke-opacity="0.7"/>
      <rect x="36" y="40" width="260" height="16" rx="8" fill="#1f2a3d"/>
      <g transform="translate(36 96)">
        <rect x="0" y="0" width="538" height="88" rx="22" fill="#0b1220" stroke="#243044" stroke-opacity="0.6"/>
        <rect x="22" y="22" width="170" height="14" rx="7" fill="#22314b"/>
        <rect x="22" y="46" width="320" height="12" rx="6" fill="#172033"/>
        <rect x="398" y="26" width="118" height="36" rx="18" fill="#38bdf8" opacity="0.14"/>
        <rect x="418" y="36" width="78" height="10" rx="5" fill="#38bdf8" opacity="0.55"/>
      </g>
      <g transform="translate(36 206)">
        <rect x="0" y="0" width="538" height="150" rx="22" fill="#0b1220" stroke="#243044" stroke-opacity="0.6"/>
        <rect x="22" y="24" width="220" height="14" rx="7" fill="#22314b"/>
        <rect x="22" y="56" width="494" height="10" rx="5" fill="#172033"/>
        <rect x="22" y="78" width="458" height="10" rx="5" fill="#172033"/>
        <rect x="22" y="100" width="390" height="10" rx="5" fill="#172033"/>
        <g transform="translate(22 118)">
          <rect x="0" y="0" width="360" height="10" rx="5" fill="#22314b"/>
          <rect x="0" y="0" width="220" height="10" rx="5" fill="#f59e0b" opacity="0.55"/>
          <circle cx="220" cy="5" r="12" fill="#f59e0b"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Soft grain -->
  <g filter="url(#soft)" opacity="0.25">
    <circle cx="260" cy="760" r="180" fill="#f59e0b"/>
    <circle cx="1370" cy="130" r="220" fill="#38bdf8"/>
  </g>
</svg>

